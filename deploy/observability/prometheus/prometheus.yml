global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: campus-health
    scrape_timeout: 10s
    static_configs:
      - targets:
          - health-exporter:9115

  - job_name: campus-api-ops
    metrics_path: /v1/campus/internal/ops-metrics
    scrape_timeout: 10s
    static_configs:
      - targets:
          - api:8080
