groups:
  - name: campus-health
    rules:
      - alert: CampusProbeDown
        expr: campus_probe_success == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Campus e站 target down: {{ $labels.name }}"
          description: "{{ $labels.target }} has failed health probing for more than 1 minute."

      - alert: CampusExporterDown
        expr: up{job=~"prometheus|campus-health"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Campus e站 exporter down: {{ $labels.instance }}"
          description: "{{ $labels.job }} target {{ $labels.instance }} is not scrapeable."
